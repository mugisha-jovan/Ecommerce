<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mujomart</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      line-height: 1.6;
    }
    header {
      background: #f8f9fa;
      color: #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 15px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .logo {
  width: 300px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.logo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}
    nav {
  display: flex;
  font-size: 11px;
  height: 15px;
  align-items: center;
    }
    nav a {
  color: #333;
  margin: 0 2px;
  text-decoration: none;
  transition: color 0.3s;
  padding: 2px 5px;
    }
    nav a:hover {
      color: #ff6600;
    }
    .menu-toggle {
      display: none;
      font-size: 26px;
      cursor: pointer;
    }



    /* Hero */
    .hero {
      background: url('https://picsum.photos/1200/500') center/cover;
      color: white;
      text-align: center;
      padding: 100px 20px;
    }
    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }
    .hero p {
      font-size: 20px;
      margin-bottom: 20px;
    }
    .btn {
      background: #ff6600;
      color: white;
      padding: 12px 25px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      border-radius: 5px;
      transition: background 0.3s;
    }
    .btn:hover {
      background: #e65c00;
    }

    /* Sections */
    section {
      padding: 50px 20px;
      text-align: center;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    .card img {
      max-width: 100%;
      border-radius: 8px;
    }
    .card h3 {
      margin: 10px 0;
    }

    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 30px;
    }

    /* Responsive Navbar */
    @media (max-width: 768px) {
      nav {
        display: flex;
        flex-direction: column;
        background: #333;
        position: absolute;
        top: 60px;
        right: 0;
        width: 200px;
      }
      nav a {
        color: white;
        margin: 0 2px;
        text-decoration: none;
        transition: color 0.3s;
        font-size: 11px;
        padding: 2px 5px;
      }
      nav.active {
        display: flex;
      }
      .menu-toggle {
        display: block;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img src="final logo.png" alt="MujoMart Logo">
    </div>
    <span class="menu-toggle">☰</span>
    <nav>
      <a href="#">Home</a>
      <a href="#">Shop</a>
      <a href="#">Categories</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Welcome to MujoMart</h1>
    <p>Discover the best deals and latest products</p>
    <button class="btn">Shop Now</button>
  </section>

  <section class="categories">
    <h2>Shop by Category</h2>
    <div class="grid">
      <div class="card">
        <img src="https://picsum.photos/300/200?1" alt="Category 1">
        <h3>Electronics</h3>
      </div>
      <div class="card">
        <img src="https://picsum.photos/300/200?2" alt="Category 2">
        <h3>Fashion</h3>
      </div>
      <div class="card">
        <img src="https://picsum.photos/300/200?3" alt="Category 3">
        <h3>Accessories</h3>
      </div>
    </div>
  </section>

  <section class="products">
    <h2>Featured Products</h2>
    <div class="grid">
      <div class="card">
        <img src="https://picsum.photos/300/200?4" alt="Product 1">
        <h3>Smartphone</h3>
        <p>$399</p>
        <button class="btn">Add to Cart</button>
      </div>
      <div class="card">
        <img src="https://picsum.photos/300/200?5" alt="Product 2">
        <h3>Headphones</h3>
        <p>$99</p>
        <button class="btn">Add to Cart</button>
      </div>
      <div class="card">
        <img src="https://picsum.photos/300/200?6" alt="Product 3">
        <h3>Sneakers</h3>
        <p>$120</p>
        <button class="btn">Add to Cart</button>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2025 MujoMart. All Rights Reserved.</p>
  </footer>

  <script>
    const toggle = document.querySelector('.menu-toggle');
    const nav = document.querySelector('nav');
    toggle.addEventListener('click', () => {
      nav.classList.toggle('active');
    });
  </script>

</body>
</html>
